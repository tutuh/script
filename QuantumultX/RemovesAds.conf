# 适用QuantumultX 抖音、微博、知乎、哔哩哔哩动画、什么值得买去广告

hostname = api*.amemv.com, aweme.snssdk.com, api.weibo.cn, mapi.weibo.com, *.uve.weibo.com, *.bilibili.com, api.live.bilibili.com, api.vc.bilibili.com, app-api.smzdm.com, homepage-api.smzdm.com, haojia-api.smzdm.com, haojia.m.smzdm.com, baike-api.smzdm.com, s-api.smzdm.com, zhiyou.m.smzdm.com, *.zhihu.com, 


